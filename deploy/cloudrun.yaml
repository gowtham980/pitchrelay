# Optional declarative service config (gcloud run services replace)
# Prefer scripts/deploy-cloudrun.sh for first deploy.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: pitchrelay
  labels:
    app: pitchrelay
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: IMAGE_PLACEHOLDER
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: LLM_PROVIDER
              value: mock
            - name: NEXT_PUBLIC_APP_NAME
              value: PitchRelay
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 30
